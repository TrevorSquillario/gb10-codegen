# compose.yaml
services:
  vllm-ds4-head:
    image: aidendle94/sparkrun-vllm-ds4-gb10:production-ready
    container_name: vllm-ds4-head
    network_mode: host
    ipc: host
    shm_size: "64gb"
    ulimits:
      memlock: -1
      stack: 67108864
    gpus: all
    devices:
      - /dev/infiniband:/dev/infiniband
    volumes:
      - ${HF_CACHE:-${HOME}/.cache/huggingface}:/cache/huggingface
    environment:
      VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
      VLLM_USE_B12X_MOE: "1"
      VLLM_SPARSE_INDEXER_MAX_LOGITS_MB: "256"
      #VLLM_NCCL_SO_PATH: /opt/env/lib/python3.12/.../libnccl.so.2
      TORCH_CUDA_ARCH_LIST: "12.1a"
      FLASHINFER_CUDA_ARCH_LIST: "12.1a"
      NCCL_NET: IB
      NCCL_IB_DISABLE: "0"
      GLOO_SOCKET_IFNAME: enp1s0f0np0
      NCCL_SOCKET_IFNAME: enp1s0f0np0
      UCX_NET_DEVICES: enp1s0f0np0
      OMPI_MCA_btl_tcp_if_include: enp1s0f0np0
      TP_SOCKET_IFNAME: enp1s0f0np0
      NCCL_IB_HCA: rocep1s0f0    # both halves for full 200 Gb/s
      #NCCL_IB_GID_INDEX: "4"
      NCCL_SET_STACK_TYPE: "1"
      NCCL_CROSS_NIC: "1"
      NCCL_CUMEM_ENABLE: "0"
      NCCL_IGNORE_CPU_AFFINITY: "1"
      NCCL_DEBUG: INFO
      NODE_RANK: 0
      HEADLESS: 0
      MASTER_ADDR: "${MASTER_ADDR:-192.168.10.10}"
    command:
      - bash
      - -lc
      - >
        exec /usr/local/bin/dsv4-vllm-entrypoint serve deepseek-ai/DeepSeek-V4-Flash
        --served-model-name deepseek-v4-flash
        --host 0.0.0.0 --port 8090 --trust-remote-code
        --tensor-parallel-size 2 --pipeline-parallel-size 1
        --kv-cache-dtype fp8 --block-size 256
        --max-model-len 1000000 --max-num-seqs 6
        --max-num-batched-tokens 8192 --gpu-memory-utilization 0.82
        --enable-prefix-caching
        --speculative-config '{"method":"mtp","num_speculative_tokens":2}'
        --tokenizer-mode deepseek_v4
        --distributed-executor-backend mp
        --tool-call-parser deepseek_v4 --enable-auto-tool-choice
        --reasoning-parser deepseek_v4
        --reasoning-config '{"reasoning_parser":"deepseek_v4","reasoning_start_str":"","reasoning_end_str":""}'
        --default-chat-template-kwargs.thinking=true
        --default-chat-template-kwargs.reasoning_effort=high
        --enable-flashinfer-autotune
        --nnodes 2 --node-rank 0
        --master-addr 192.168.10.10 --master-port 25000

  vllm-ds4-worker:
    image: aidendle94/sparkrun-vllm-ds4-gb10:production-ready
    container_name: vllm-ds4-worker
    network_mode: host
    ipc: host
    shm_size: "64gb"
    ulimits:
      memlock: -1
      stack: 67108864
    gpus: all
    devices:
      - /dev/infiniband:/dev/infiniband
    volumes:
      - ${HF_CACHE:-${HOME}/.cache/huggingface}:/cache/huggingface
    environment:
      VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
      VLLM_USE_B12X_MOE: "1"
      VLLM_SPARSE_INDEXER_MAX_LOGITS_MB: "256"
      #VLLM_NCCL_SO_PATH: /opt/env/lib/python3.12/.../libnccl.so.2
      TORCH_CUDA_ARCH_LIST: "12.1a"
      FLASHINFER_CUDA_ARCH_LIST: "12.1a"
      NCCL_NET: IB
      NCCL_IB_DISABLE: "0"
      GLOO_SOCKET_IFNAME: enp1s0f0np0
      NCCL_SOCKET_IFNAME: enp1s0f0np0
      UCX_NET_DEVICES: enp1s0f0np0
      OMPI_MCA_btl_tcp_if_include: enp1s0f0np0
      TP_SOCKET_IFNAME: enp1s0f0np0
      NCCL_IB_HCA: rocep1s0f0    # both halves for full 200 Gb/s
      #NCCL_IB_GID_INDEX: "4"
      NCCL_SET_STACK_TYPE: "1"
      NCCL_CROSS_NIC: "1"
      NCCL_CUMEM_ENABLE: "0"
      NCCL_IGNORE_CPU_AFFINITY: "1"
      NCCL_DEBUG: INFO
      NODE_RANK: 1
      HEADLESS: "${HEADLESS:-1}"
      MASTER_ADDR: "${MASTER_ADDR:-192.168.10.10}"
    command:
      - bash
      - -lc
      - >
        exec /usr/local/bin/dsv4-vllm-entrypoint serve deepseek-ai/DeepSeek-V4-Flash
        --served-model-name deepseek-v4-flash
        --host 0.0.0.0 --port 8090 --trust-remote-code
        --tensor-parallel-size 2 --pipeline-parallel-size 1
        --kv-cache-dtype fp8 --block-size 256
        --max-model-len 1000000 --max-num-seqs 6
        --max-num-batched-tokens 8192 --gpu-memory-utilization 0.82
        --enable-prefix-caching
        --speculative-config '{"method":"mtp","num_speculative_tokens":2}'
        --tokenizer-mode deepseek_v4
        --distributed-executor-backend mp
        --tool-call-parser deepseek_v4 --enable-auto-tool-choice
        --reasoning-parser deepseek_v4
        --reasoning-config '{"reasoning_parser":"deepseek_v4","reasoning_start_str":"","reasoning_end_str":""}'
        --default-chat-template-kwargs.thinking=true
        --default-chat-template-kwargs.reasoning_effort=high
        --enable-flashinfer-autotune
        --nnodes 2 --node-rank 1
        --master-addr 192.168.10.10 --master-port 25000
        --headless